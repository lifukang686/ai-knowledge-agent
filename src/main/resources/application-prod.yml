spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  quartz:
    job-store-type: memory
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    baseline-on-migrate: true
    clean-disabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

knowledge-agent:
  vector-store:
    table-name: ${VECTOR_STORE_TABLE}
    dimension: ${VECTOR_STORE_DIMENSION}

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET}

logging:
  level:
    com.fukang.knowledge.agent: ${KNOWLEDGE_AGENT_LOG_LEVEL:INFO}
    dev.langchain4j: ${LANGCHAIN4J_LOG_LEVEL:INFO}
