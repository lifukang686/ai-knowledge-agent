spring:
  application:
    name: knowledge-agent
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/postgres?currentSchema=knowledge_agent
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  quartz:
    job-store-type: memory
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      port: 6379
      host: 127.0.0.1

# ============================================================
# 动态模型配置（knowledge-agent 自定义）
# ============================================================
knowledge-agent:
  model:
    # 模型实例本地缓存过期时间（秒），默认 300 秒 = 5 分钟
    cache-ttl-seconds: 300
    # 缓存最大容量，默认 50 个模型实例
    cache-max-size: 50
  # 语义检索配置
  retrieval:
    # 默认返回结果数量
    top-k: 5
    # 默认相似度阈值 (0.0 ~ 1.0)，低于此值的结果将被过滤
    similarity-threshold: 0.7
  # pgvector 向量存储配置（langchain4j 集成）
  vector-store:
    table-name: vector_embedding
    dimension: 1536
    index-type: hnsw
    create-table: true
    drop-table-first: false
  # 文档后处理管道配置
  document-processing:
    # 核心线程数：同时处理最多2个文档
    core-pool-size: 2
    # 最大线程数
    max-pool-size: 4
    # 队列容量
    queue-capacity: 100
    # 嵌入阶段最大重试次数
    embed-retry-max: 3
    # 嵌入阶段重试基础退避秒数
    embed-retry-base-seconds: 2
  # 文档分块配置
  chunking:
    chunk-size: 800
    overlap-size: 100
    strategy: paragraph
    max-segment-size: 1000

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id # 雪花算法
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: knowledge-agent