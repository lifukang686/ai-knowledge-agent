spring:
  application:
    name: knowledge-agent
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/postgres?currentSchema=knowledge_agent
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  quartz:
    job-store-type: memory
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:default-key}
      chat:
        options:
          model: gpt-3.5-turbo
#    anthropic:
#      api-key: ${ANTHROPIC_API_KEY:default-key}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      port: 6379
      host: 127.0.0.1


mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id # 雪花算法
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: knowledge-agent
