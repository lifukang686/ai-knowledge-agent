spring:
  application:
    name: knowledge-agent
  profiles:
    default: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

knowledge-agent:
  model:
    cache-ttl-seconds: ${MODEL_CACHE_TTL_SECONDS:300}
    cache-max-size: ${MODEL_CACHE_MAX_SIZE:50}
  retrieval:
    top-k: ${RAG_TOP_K:8}
    similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.6}
    hybrid-enabled: ${RAG_HYBRID_ENABLED:true}
    bm25-threshold: ${RAG_BM25_THRESHOLD:0.1}
    rrf-k: ${RAG_RRF_K:60}
  vector-store:
    table-name: ${VECTOR_STORE_TABLE:vector_embedding}
    dimension: ${VECTOR_STORE_DIMENSION:1024}
    index-type: ${VECTOR_STORE_INDEX_TYPE:hnsw}
    create-table: ${VECTOR_STORE_CREATE_TABLE:true}
    drop-table-first: false
  document-processing:
    core-pool-size: ${DOCUMENT_PROCESSING_CORE_POOL_SIZE:2}
    max-pool-size: ${DOCUMENT_PROCESSING_MAX_POOL_SIZE:4}
    queue-capacity: ${DOCUMENT_PROCESSING_QUEUE_CAPACITY:100}
    embed-retry-max: ${DOCUMENT_PROCESSING_EMBED_RETRY_MAX:3}
    embed-retry-base-seconds: ${DOCUMENT_PROCESSING_EMBED_RETRY_BASE_SECONDS:2}
  chunking:
    strategy: ${CHUNK_STRATEGY:paragraph}
    paragraph:
      max-segment-size: ${CHUNK_PARAGRAPH_MAX_SEGMENT_SIZE:800}
      overlap-size: ${CHUNK_PARAGRAPH_OVERLAP_SIZE:300}
    sentence:
      max-segment-size: ${CHUNK_SENTENCE_MAX_SEGMENT_SIZE:600}
      overlap-size: ${CHUNK_SENTENCE_OVERLAP_SIZE:100}
    fixed:
      max-segment-size: ${CHUNK_FIXED_MAX_SEGMENT_SIZE:500}
      overlap-size: ${CHUNK_FIXED_OVERLAP_SIZE:100}

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
