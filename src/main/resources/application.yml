spring:
  application:
    name: knowledge-agent
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/postgres?currentSchema=knowledge_agent
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  quartz:
    job-store-type: memory
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      port: 6379
      host: 127.0.0.1

# ============================================================
# 动态模型配置（knowledge-agent 自定义）
# ============================================================
knowledge-agent:
  model:
    # 模型实例本地缓存过期时间（秒），默认 300 秒 = 5 分钟
    cache-ttl-seconds: 300
    # 缓存最大容量，默认 50 个模型实例
    cache-max-size: 50

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id # 雪花算法
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: knowledge-agent