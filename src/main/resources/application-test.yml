spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/postgres?currentSchema=knowledge_agent_test}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  quartz:
    job-store-type: memory
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none
  flyway:
    baseline-on-migrate: true
    clean-disabled: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:knowledge-agent-test}

logging:
  level:
    com.fukang.knowledge.agent: ${KNOWLEDGE_AGENT_LOG_LEVEL:INFO}
    dev.langchain4j: ${LANGCHAIN4J_LOG_LEVEL:WARN}
